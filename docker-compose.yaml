networks:
    pulse-net:
        driver: bridge

services:
    # buffer layer and idempotency cache
    redis:
        image: redis:8.0-alpine
        container_name: pulse-redis
        command: redis-server --appendonly yes # persist stream data to disk
        restart: unless-stopped
        ports:
            - "6379:6379"
        networks:
            - pulse-net
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 8s
            timeout: 4s
            retries: 4
            start_period: 4s

    # analytical columnar database
    clickhouse:
        image: clickhouse/clickhouse-server:25.8-alpine
        environment:
            CLICKHOUSE_USER: pulse_admin
            CLICKHOUSE_PASSWORD: pulse_super_secret_password
            CLICKHOUSE_DB: pulse
        container_name: pulse-clickhouse
        restart: unless-stopped
        ports:
            - "8123:8123" # HTTP interface
            - "9000:9000" # native client interface
        networks:
            - pulse-net
        volumes:
            - clickhouse_data:/var/lib/clickhouse
        ulimits:
            nofile:
                soft: 262144
                hard: 262144
        healthcheck:
            test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
            interval: 8s
            timeout: 4s
            retries: 4
            start_period: 16s

volumes:
    redis_data:
    clickhouse_data:
