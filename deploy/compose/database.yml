services:
    # buffer layer and idempotency cache
    redis:
        image: redis:8.0-alpine
        container_name: pulse-redis
        command: redis-server --appendonly yes
        restart: unless-stopped
        ports:
            - "6379:6379"
        networks:
            - pulse-net
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 8s
            timeout: 4s
            retries: 4
            start_period: 4s

    # analytical columnar database
    clickhouse:
        image: clickhouse/clickhouse-server:25.8-alpine
        environment:
            CLICKHOUSE_USER: pulse_ch
            CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
            CLICKHOUSE_DB: pulse
        container_name: pulse-clickhouse
        restart: unless-stopped
        ports:
            - "8123:8123"
            - "9000:9000"
        networks:
            - pulse-net
        volumes:
            - clickhouse_data:/var/lib/clickhouse
        ulimits:
            nofile:
                soft: 262144
                hard: 262144
        healthcheck:
            test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
            interval: 8s
            timeout: 4s
            retries: 4
            start_period: 16s

    # relational database
    postgres:
        image: postgres:16-alpine
        container_name: pulse-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: pulse_pg
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: pulse
        ports:
            - "5432:5432"
        networks:
            - pulse-net
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U pulse_pg -d pulse"]
            interval: 8s
            timeout: 4s
            retries: 4
            start_period: 16s
