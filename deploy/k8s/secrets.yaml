# Secrets for pulse-api (Postgres credentials)
# In a real cluster these would come from Vault / external-secrets.
# For minikube, encode your values: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: pulse-api-secrets
  namespace: pulse
type: Opaque
stringData:
  PULSE_PG_PASSWORD: "pulse_pg_super_secret_password"
---
# Secrets for pulse-worker (ClickHouse credentials)
apiVersion: v1
kind: Secret
metadata:
  name: pulse-worker-secrets
  namespace: pulse
type: Opaque
stringData:
  PULSE_CLICKHOUSE_PASSWORD: "pulse_ch_super_secret_password"
