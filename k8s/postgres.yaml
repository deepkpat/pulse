---
# postgres stateful-set
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: postgres-ss
    namespace: pulse
    labels:
        app: postgres
spec:
    serviceName: postgres-hls
    replicas: 1
    selector:
        matchLabels:
            app: postgres
    template:
        metadata:
            labels:
                app: postgres
        spec:
            terminationGracePeriodSeconds: 32
            containers:
                - name: postgres
                  image: postgres:16-alpine
                  ports:
                      - containerPort: 5432
                        name: postgres
                  env:
                      - name: POSTGRES_USER
                        value: "pulse_pg"
                      - name: POSTGRES_DB
                        value: "pulse"
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: pg-secrets
                                key: POSTGRES_PASSWORD
                  resources:
                      requests:
                          cpu: "250m"
                          memory: "512Mi"
                      limits:
                          cpu: "1000m"
                          memory: "1Gi"
                  readinessProbe:
                      exec:
                          command:
                              ["pg_isready", "-U", "pulse_pg", "-d", "pulse"]
                      initialDelaySeconds: 16
                      periodSeconds: 8
                      timeoutSeconds: 4
                      failureThreshold: 4
                  livenessProbe:
                      exec:
                          command:
                              ["pg_isready", "-U", "pulse_pg", "-d", "pulse"]
                      initialDelaySeconds: 16
                      periodSeconds: 8
                      timeoutSeconds: 4
                      failureThreshold: 4
                  volumeMounts:
                      - name: postgres-data
                        mountPath: /var/lib/postgresql/data
    volumeClaimTemplates:
        - metadata:
              name: postgres-data
          spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                  requests:
                      storage: 10Gi

---
# postgres headless service
apiVersion: v1
kind: Service
metadata:
    name: postgres-hls
    namespace: pulse
    labels:
        app: postgres
spec:
    clusterIP: None
    ports:
        - port: 5432
          name: postgres
    selector:
        app: postgres

---
# postgres service
apiVersion: v1
kind: Service
metadata:
    name: postgres-svc
    namespace: pulse
    labels:
        app: postgres
spec:
    type: ClusterIP
    ports:
        - port: 5432
          targetPort: 5432
          name: postgres
    selector:
        app: postgres
