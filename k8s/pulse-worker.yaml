---
# pulse-worker deployment
apiVersion: apps/v1
kind: Deployment
metadata:
    name: pulse-worker
    namespace: pulse
    labels:
        app: pulse-worker
spec:
    replicas: 2
    selector:
        matchLabels:
            app: pulse-worker
    template:
        metadata:
            labels:
                app: pulse-worker
        spec:
            containers:
                - name: pulse-worker
                  image: pulse-worker:latest
                  imagePullPolicy: Never
                  ports:
                      - containerPort: 9091
                        name: metrics
                  env:
                      - name: PULSE_ENV
                        value: "production"
                      - name: PULSE_CONCURRENCY
                        value: "2"
                      - name: PULSE_REDIS_ADDR
                        value: "redis-svc:6379"
                      - name: PULSE_CLICKHOUSE_ADDR
                        value: "clickhouse-svc:9000"
                      - name: PULSE_CLICKHOUSE_USER
                        value: "pulse_ch"
                      - name: PULSE_CLICKHOUSE_DATABASE
                        value: "pulse"
                      - name: PULSE_CLICKHOUSE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: ch-secrets
                                key: CLICKHOUSE_PASSWORD
                  resources:
                      requests:
                          cpu: "100m"
                          memory: "64Mi"
                      limits:
                          cpu: "500m"
                          memory: "256Mi"

---
# pulse-worker metrics service
apiVersion: v1
kind: Service
metadata:
    name: pulse-worker-metrics
    namespace: pulse
    labels:
        app: pulse-worker
spec:
    type: NodePort
    selector:
        app: pulse-worker
    ports:
        - name: metrics
          port: 9091
          targetPort: 9091
          nodePort: 30901

---
# pulse-worker hpa
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: pulse-worker-hpa
    namespace: pulse
    labels:
        app: pulse-worker
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: pulse-worker
    minReplicas: 2
    maxReplicas: 20
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: 80
