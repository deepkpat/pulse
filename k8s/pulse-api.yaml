---
# pulse-api deployment
apiVersion: apps/v1
kind: Deployment
metadata:
    name: pulse-api
    namespace: pulse
    labels:
        app: pulse-api
spec:
    replicas: 1
    selector:
        matchLabels:
            app: pulse-api
    template:
        metadata:
            labels:
                app: pulse-api
        spec:
            containers:
                - name: pulse-api
                  image: pulse-api:latest
                  imagePullPolicy: Never
                  ports:
                      - containerPort: 8000
                        name: http
                  env:
                      - name: PULSE_ENV
                        value: "production"
                      - name: PULSE_REDIS_ADDR
                        value: "redis-svc:6379"
                      - name: PULSE_PG_HOST
                        value: "postgres-svc"
                      - name: PULSE_PG_PORT
                        value: "5432"
                      - name: PULSE_PG_USER
                        value: "pulse_pg"
                      - name: PULSE_PG_DBNAME
                        value: "pulse"
                      - name: PULSE_PG_SSLMODE
                        value: "disable"
                      - name: PULSE_PG_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: pg-secrets
                                key: POSTGRES_PASSWORD
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: 8000
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: 8000
                      initialDelaySeconds: 15
                      periodSeconds: 20
                  resources:
                      requests:
                          cpu: "100m"
                          memory: "64Mi"
                      limits:
                          cpu: "500m"
                          memory: "256Mi"

---
# pulse-api service
apiVersion: v1
kind: Service
metadata:
    name: pulse-api
    namespace: pulse
    labels:
        app: pulse-api
spec:
    type: NodePort
    selector:
        app: pulse-api
    ports:
        - port: 8000
          targetPort: 8000
          nodePort: 30800
          name: http

---
# pulse-api hpa
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: pulse-api-hpa
    namespace: pulse
    labels:
        app: pulse-api
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: pulse-api
    minReplicas: 1
    maxReplicas: 10
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: 80
