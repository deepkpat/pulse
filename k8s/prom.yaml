---
# prometheus service account (RBAC)
apiVersion: v1
kind: ServiceAccount
metadata:
    name: prometheus
    namespace: pulse
    labels:
        app: prometheus

---
# prometheus role (pod discovery)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: prometheus-pod-reader
    namespace: pulse
    labels:
        app: prometheus
rules:
    - apiGroups: [""]
      resources: ["pods", "services", "endpoints"]
      verbs: ["get", "list", "watch"]

---
# prometheus role binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: prometheus-pod-reader-binding
    namespace: pulse
    labels:
        app: prometheus
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: prometheus-pod-reader
subjects:
    - kind: ServiceAccount
      name: prometheus
      namespace: pulse

---
# prometheus configuration
apiVersion: v1
kind: ConfigMap
metadata:
    name: prometheus-config
    namespace: pulse
    labels:
        app: prometheus
data:
    prometheus.yml: |
        global:
            scrape_interval: 15s
            evaluation_interval: 30s

        rule_files:
            - /etc/prometheus/alerts.yml

        scrape_configs:
            # scrape pulse-api pods
            - job_name: pulse-api-pods
              kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                        names: [pulse]
              relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    action: keep
                    regex: pulse-api
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    target_label: app
                  - source_labels: [__address__]
                    action: replace
                    regex: ([^:]+)(?::\d+)?
                    replacement: $1:8000
                    target_label: __address__

            # scrape pulse-worker pods
            - job_name: pulse-worker-pods
              kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                        names: [pulse]
              relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    action: keep
                    regex: pulse-worker
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    target_label: app
                  - source_labels: [__address__]
                    action: replace
                    regex: ([^:]+)(?::\d+)?
                    replacement: $1:9091
                    target_label: __address__

    alerts.yml: |
        groups:
            - name: pulse_reliability
              interval: 30s
              rules:
                  # ===== connection health alerts (majority failure) =====
                  # alert when >50% of pods lose connection to a service
                  - alert: ClickHouseMajorityConnectionDown
                    expr: avg by (app) (pulse_clickhouse_connection_health) < 0.5
                    for: 30s
                    annotations:
                        summary: "ClickHouse connection down for majority of {{ $labels.app }}"
                        description: "More than 50% of {{ $labels.app }} pods lost connection to ClickHouse. Immediate investigation required."

                  - alert: PostgresMajorityConnectionDown
                    expr: avg by (app) (pulse_postgres_connection_health) < 0.5
                    for: 30s
                    annotations:
                        summary: "PostgreSQL connection down for majority of {{ $labels.app }}"
                        description: "More than 50% of {{ $labels.app }} pods lost connection to PostgreSQL. Check database availability."

                  - alert: RedisMajorityConnectionDown
                    expr: avg by (app) (pulse_redis_connection_health) < 0.5
                    for: 10s
                    annotations:
                        summary: "Redis connection down for majority of {{ $labels.app }}"
                        description: "More than 50% of {{ $labels.app }} pods lost connection to Redis. Check cache service health."

                  # ===== latency alerts (aggregated histograms) =====
                  # alert when database response times degrade significantly
                  - alert: ClickHouseHighLatency
                    expr: histogram_quantile(0.95, sum by (le, app) (rate(pulse_clickhouse_ping_duration_seconds_bucket[5m]))) > 0.5
                    for: 2m
                    annotations:
                        summary: "ClickHouse p95 latency high ({{ $value }}s)"
                        description: "ClickHouse is responding slowly across {{ $labels.app }} pods. Check query load and database performance."

                  - alert: PostgresHighLatency
                    expr: histogram_quantile(0.95, sum by (le, app) (rate(pulse_postgres_ping_duration_seconds_bucket[5m]))) > 0.1
                    for: 2m
                    annotations:
                        summary: "PostgreSQL p95 latency high ({{ $value }}s)"
                        description: "PostgreSQL is responding slowly across {{ $labels.app }} pods. Check connection pool and query execution."

                  # ===== error rate alerts (cluster totals) =====
                  # alert on increasing error rates that may self-heal
                  - alert: StorageTransientErrorsIncreasing
                    expr: sum by (app) (rate(pulse_storage_inserts_total{result="error_transient"}[5m])) > 0.1
                    for: 1m
                    annotations:
                        summary: "High transient storage errors ({{ $value }}/sec)"
                        description: "Transient errors in storage operations for {{ $labels.app }}. These may resolve, but monitor closely."

                  # alert on permanent errors that require immediate action
                  - alert: StoragePermanentErrorsDetected
                    expr: sum by (app) (rate(pulse_storage_inserts_total{result="error_permanent"}[5m])) > 0.01
                    for: 5m
                    annotations:
                        summary: "Permanent storage errors detected ({{ $value }}/sec)"
                        description: "Permanent errors in storage operations for {{ $labels.app }}. Immediate remediation required."

                  # alert on dead letter queue backlog growth
                  - alert: DLQBacklogIncreasing
                    expr: sum by (app) (rate(pulse_dlq_writes_total[5m])) > 1
                    for: 1m
                    annotations:
                        summary: "DLQ backlog increasing ({{ $value }}/sec)"
                        description: "Dead letter queue is growing for {{ $labels.app }}. Review failed message processing."

---
# prometheus headless service (for network identity)
apiVersion: v1
kind: Service
metadata:
    name: prometheus-hls
    namespace: pulse
    labels:
        app: prometheus
spec:
    clusterIP: None
    ports:
        - port: 9090
          name: prometheus
    selector:
        app: prometheus

---
# prometheus service (for external access)
apiVersion: v1
kind: Service
metadata:
    name: prometheus-svc
    namespace: pulse
    labels:
        app: prometheus
spec:
    type: NodePort
    ports:
        - port: 9090
          targetPort: 9090
          nodePort: 30999
          name: prometheus
    selector:
        app: prometheus

---
# prometheus stateful set
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: prometheus-ss
    namespace: pulse
    labels:
        app: prometheus
spec:
    serviceName: prometheus-hls
    replicas: 1
    selector:
        matchLabels:
            app: prometheus
    template:
        metadata:
            labels:
                app: prometheus
        spec:
            serviceAccountName: prometheus
            terminationGracePeriodSeconds: 32
            securityContext:
                fsGroup: 65534 # nobody group (Prometheus default user)
            initContainers:
                - name: fix-permissions
                  image: busybox:latest
                  command:
                      [
                          "sh",
                          "-c",
                          "mkdir -p /prometheus && chmod 777 /prometheus",
                      ]
                  volumeMounts:
                      - name: prometheus-storage
                        mountPath: /prometheus
            containers:
                - name: prometheus
                  image: prom/prometheus:v3.0.0
                  securityContext:
                      runAsNonRoot: true
                      runAsUser: 65534 # nobody user
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  args:
                      - "--config.file=/etc/prometheus/prometheus.yml"
                      - "--storage.tsdb.path=/prometheus"
                      - "--storage.tsdb.retention.time=30d"
                  ports:
                      - containerPort: 9090
                        name: prometheus
                  env: []
                  resources:
                      requests:
                          cpu: "250m"
                          memory: "512Mi"
                      limits:
                          cpu: "1000m"
                          memory: "2Gi"
                  readinessProbe:
                      httpGet:
                          path: /-/ready
                          port: 9090
                      initialDelaySeconds: 8
                      periodSeconds: 8
                      timeoutSeconds: 4
                      failureThreshold: 4
                  livenessProbe:
                      httpGet:
                          path: /-/healthy
                          port: 9090
                      initialDelaySeconds: 8
                      periodSeconds: 8
                      timeoutSeconds: 4
                      failureThreshold: 4
                  volumeMounts:
                      - name: config-volume
                        mountPath: /etc/prometheus
                        readOnly: true
                      - name: prometheus-storage
                        mountPath: /prometheus
                      - name: prometheus-tmp
                        mountPath: /tmp
                      - name: prometheus-runtime
                        mountPath: /var/run/prometheus
            volumes:
                - name: config-volume
                  configMap:
                      name: prometheus-config
                - name: prometheus-tmp
                  emptyDir: {}
                - name: prometheus-runtime
                  emptyDir: {}
    volumeClaimTemplates:
        - metadata:
              name: prometheus-storage
          spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                  requests:
                      storage: 10Gi
